name: Bedrock CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run Python tests
        env:
          BEDROCK_ENV: test
          BEDROCK_DEV_MODE: true
          BEDROCK_TIER: developer
        run: |
          python -m pytest tests/ -v --tb=short --cov=bedrock --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.14'
        with:
          name: coverage-report
          path: coverage.xml

  test-typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-ts

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdk-ts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript tests
        run: npx jest --verbose --coverage

      - name: Upload TS coverage
        uses: actions/upload-artifact@v4
        with:
          name: ts-coverage-report
          path: sdk-ts/coverage/

  security-scan:
    runs-on: ubuntu-latest
    needs: [test-python]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install bandit safety
          pip install -r requirements.txt

      - name: Bandit security scan
        run: bandit -r core/bedrock/ -f json -o bandit-report.json || true

      - name: Safety dependency check
        run: safety check -r requirements.txt || true

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-python, test-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f deploy/Dockerfile -t bedrock-core:latest .

      - name: Verify image
        run: docker run --rm bedrock-core:latest python -c "from bedrock.config import CoreConfig; print('Build OK')"