name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "core[dev,stripe]"

      - name: Run tests
        run: pytest tests/ --tb=short -q

  test-sdk-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core + SDK
        run: |
          python -m pip install --upgrade pip
          pip install -e "core[dev,stripe]"
          pip install -e "sdk-python[dev]"

      - name: Run SDK tests
        run: pytest sdk-python/tests/ --tb=short -q

  test-typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-ts

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and linting tools
        run: |
          python -m pip install --upgrade pip
          pip install -e "core[dev,stripe]"
          pip install ruff black isort mypy

      - name: Ruff check
        run: ruff check core/bedrock/

      - name: Black check
        run: black --check core/bedrock/

      - name: isort check
        run: isort --check-only core/bedrock/