name: Bedrock CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: core/pyproject.toml

      - name: Install dependencies
        run: |
          cd core
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Python tests
        env:
          BEDROCK_ENV: test
          BEDROCK_DEV_MODE: true
          BEDROCK_TIER: developer
        run: |
          cd core
          python -m pytest tests/ -v --tb=short

      - name: Run Python SDK tests
        run: |
          cd sdk-python
          python -m pip install -e ".[dev]"
          python -m pytest tests/ -v --tb=short

  test-typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-ts

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdk-ts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript tests
        run: npx jest --verbose

  security-scan:
    runs-on: ubuntu-latest
    needs: [test-python]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          cd core
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install bandit safety

      - name: Bandit security scan
        run: bandit -r core/bedrock/ -f json -o bandit-report.json || true

      - name: Safety dependency check
        run: safety check || true

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-python, test-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f deploy/Dockerfile -t bedrock-core:latest .

      - name: Verify image
        run: docker run --rm bedrock-core:latest python -c "from bedrock.config import CoreConfig; print('Build OK')"